<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#05060a"/>
      <stop offset="100%" stop-color="#0a0b12"/>
    </linearGradient>
    <radialGradient id="violet" cx="80%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyan" cx="0%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="60%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#violet)"/>
  <rect width="1200" height="630" fill="url(#cyan)"/>

  <!-- Logo monogram -->
  <g transform="translate(80, 80)">
    <rect width="72" height="72" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
    <text x="36" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="white">AN</text>
  </g>
  <text x="172" y="120" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="rgba(255,255,255,0.7)" letter-spacing="3">ARCHANA N</text>
  <text x="172" y="148" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.45)" letter-spacing="2">SOFTWARE TEST ENGINEER · HYDERABAD</text>

  <!-- Headline -->
  <text x="80" y="320" font-family="'Space Grotesk', Inter, system-ui, sans-serif" font-size="120" font-weight="700" fill="white" letter-spacing="-3">Quality is</text>
  <text x="80" y="450" font-family="'Space Grotesk', Inter, system-ui, sans-serif" font-size="120" font-weight="700" fill="url(#accent)" letter-spacing="-3">the product.</text>

  <!-- Tag chips -->
  <g transform="translate(80, 510)" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.75)">
    <g>
      <rect x="0" y="0" width="140" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
      <text x="70" y="29" text-anchor="middle">Playwright</text>
    </g>
    <g transform="translate(154,0)">
      <rect width="120" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
      <text x="60" y="29" text-anchor="middle">Postman</text>
    </g>
    <g transform="translate(288,0)">
      <rect width="115" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
      <text x="57.5" y="29" text-anchor="middle">JMeter</text>
    </g>
    <g transform="translate(417,0)">
      <rect width="195" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
      <text x="97.5" y="29" text-anchor="middle">API · Cybersecurity</text>
    </g>
  </g>

  <!-- Stats top right -->
  <g transform="translate(900, 80)" font-family="Inter, system-ui, sans-serif" fill="white">
    <text x="280" y="40" text-anchor="end" font-size="14" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="3">PROOF</text>
    <g transform="translate(0,55)">
      <text x="280" y="32" text-anchor="end" font-size="44" font-weight="700">4+ years</text>
      <text x="280" y="56" text-anchor="end" font-size="13" fill="rgba(255,255,255,0.4)">shipping QA</text>
    </g>
    <g transform="translate(0,135)">
      <text x="280" y="32" text-anchor="end" font-size="44" font-weight="700" fill="url(#accent)">60% faster</text>
      <text x="280" y="56" text-anchor="end" font-size="13" fill="rgba(255,255,255,0.4)">regression cycles</text>
    </g>
    <g transform="translate(0,215)">
      <text x="280" y="32" text-anchor="end" font-size="44" font-weight="700">100+ APIs</text>
      <text x="280" y="56" text-anchor="end" font-size="13" fill="rgba(255,255,255,0.4)">contracts validated</text>
    </g>
  </g>
</svg>
